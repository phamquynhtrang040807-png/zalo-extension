services:
  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite:////data/auto_zalo.db
      GOOGLE_SERVICE_ACCOUNT_FILE: /run/secrets/google-service-account.json
      GOOGLE_OAUTH_TOKEN_FILE: /run/secrets/google-oauth-token.json
    ports:
      - "8001:8001"
    volumes:
      - auto-zalo-data:/data
      - ./backend/secrets:/run/secrets:ro
    restart: unless-stopped

  worker:
    build: ./backend
    command: python -m app.worker
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite:////data/auto_zalo.db
      GOOGLE_SERVICE_ACCOUNT_FILE: /run/secrets/google-service-account.json
      GOOGLE_OAUTH_TOKEN_FILE: /run/secrets/google-oauth-token.json
    volumes:
      - auto-zalo-data:/data
      - ./backend/secrets:/run/secrets:ro
    depends_on:
      zalo-bridge:
        condition: service_healthy
    restart: unless-stopped

  zalo-bridge:
    build:
      context: .
      dockerfile: zalo-bridge/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATA_DIR: /data
      ZALO_BRIDGE_TOKEN: ${ZALO_TOKEN}
      PORT: 3005
    ports:
      - "127.0.0.1:3005:3005"
    volumes:
      - auto-zalo-session:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3005/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  auto-zalo-data:
  auto-zalo-session:
